<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fun Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <header>
        <h1>📚 My Book World</h1>
        <div id="reward-badge">⭐ Star Points: <span id="points">0</span></div>
    </header>

    <main>
        <button id="scan-btn" onclick="startScanner()">➕ Scan New Book</button>
        
        <div id="reader" style="display:none; margin: 20px auto; max-width: 500px;"></div>

        <section id="library-section">
            <h2>My Bookshelf</h2>
            <div id="book-list">
                </div>
        </section>
    </main>

    <div id="timer-modal" style="display:none;">
        <div class="modal-content">
            <h2 id="reading-title">Reading...</h2>
            <div id="clock">00:00</div>
            <button id="stop-btn" onclick="stopReading()">Stop & Get Rewards! 🏁</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
