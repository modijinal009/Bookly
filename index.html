<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fun Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

    <header>
        <h1>📚 My Book World</h1>
        <div id="reward-badge">⭐ Star Points: <span id="points">0</span></div>
    </header>

    <main>
        <button id="scan-btn" onclick="startScanner()">➕ Scan New Book</button>
        
        <div id="reader" style="display:none; margin: 20px auto; max-width: 500px; border: 5px solid #FF9800; border-radius: 15px; overflow: hidden;"></div>

        <section id="library-section">
            <h2>My Bookshelf</h2>
            <div id="book-list"></div>
        </section>

        <section id="reading-history" style="margin-top: 50px; border-top: 4px dashed #FF9800; padding-top: 20px;">
            <h3>📜 My Reading History</h3>
            <div id="history-list"></div>
        </section>
    </main>

    <div id="timer-modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #FF9800; padding: 40px; border-radius: 30px; color: white; text-align: center;">
            <h2 id="reading-title" style="margin-bottom: 10px;">Reading...</h2>
            <div id="clock" style="font-size: 60px; margin: 20px 0; font-family: monospace;">00:00</div>
            <button id="stop-btn" onclick="stopReading()" style="background: #f44336; color: white; font-size: 20px; padding: 15px 30px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold;">Stop & Get Rewards! 🏁</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
